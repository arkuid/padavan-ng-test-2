name: Build firmware

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Router model name (for config search)'
        required: true
        default: 'tl_c20-v4'
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults: { run: { shell: bash } }
    
    steps:
    - uses: actions/checkout@v4

    - name: Get variables
      id: get_vars
      run: |
        sed -i 's|\r$||g' variables
        . variables
        for v in "${!PADAVAN_@}" "${!CONFIG_@}"; do
          echo "$v=${!v}" >> $GITHUB_ENV
        done

    - name: Clone padavan-ng repository
      run: |
        git config --global --add safe.directory '*'
        git clone -b "$PADAVAN_BRANCH" "$PADAVAN_REPO" padavan-ng
        git -C padavan-ng checkout "$PADAVAN_COMMIT"
        echo "CONFIGS_PATH=padavan-ng/trunk/configs/templates" >> $GITHUB_ENV

    - name: Find and process model configuration
      id: find_model_config
      run: |
        # Construct config filename from model name
        CONFIG_FILENAME="${{ github.event.inputs.model_name }}.config"
        echo "Looking for config file: $CONFIG_FILENAME in $CONFIGS_PATH"
        
        # Find model config file in templates directory
        CONFIG_FILE=$(find "$CONFIGS_PATH" -name "$CONFIG_FILENAME" -type f | head -1)
        
        if [ -z "$CONFIG_FILE" ]; then
          echo "Config file $CONFIG_FILENAME not found in $CONFIGS_PATH"
          echo "Available config files:"
          find "$CONFIGS_PATH" -name "*.config" -type f
          exit 1
        fi
        
        echo "Found model config: $CONFIG_FILE"
        echo "config_file=$CONFIG_FILE" >> $GITHUB_OUTPUT
        
        # Copy model config as base
        cp "$CONFIG_FILE" build.config
        
        # Add variables from common-vars.cfg if exists in repository root
        COMMON_VARS_FILE="common-vars.cfg"
        
        if [ -f "$COMMON_VARS_FILE" ]; then
          echo "Adding variables from $COMMON_VARS_FILE with priority"
          
          # Process common-vars.cfg and apply overrides
          while IFS= read -r line; do
            # Skip empty lines
            if [[ -z "$line" ]]; then
              continue
            fi
            
            # Extract variable name (part before =) for all lines including commented
            if [[ "$line" =~ ^[[:space:]]*#?[[:space:]]*([A-Za-z_][A-Za-z0-9_]*)= ]]; then
              var_name="${BASH_REMATCH[1]}"
              
              if [[ -n "$var_name" ]]; then
                # Remove this variable from build.config if exists (both commented and not)
                sed -i "/^[[:space:]]*${var_name}=/d" build.config
                sed -i "/^[[:space:]]*#${var_name}=/d" build.config
                
                # Add the line from common-vars.cfg (as is, with comment or without)
                echo "$line" >> build.config
              fi
            fi
          done < "$COMMON_VARS_FILE"
          
          echo "=== Content of common-vars.cfg ==="
          cat "$COMMON_VARS_FILE"
        else
          echo "common-vars.cfg not found in repository root"
        fi
        
        # Display final config
        echo "=== Final build.config ==="
        cat build.config

    - name: Load config variables
      run: |
        sed -i 's|\r$||g' build.config
        # Load all variables from build.config
        set -a
        . build.config
        set +a
        
        # Export all defined variables to GITHUB_ENV
        for var in $(grep -oE '^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*' build.config | grep -v '^#' | tr -d ' '); do
          if [[ -v "$var" ]]; then
            echo "${var}=${!var}" >> $GITHUB_ENV
          fi
        done

    - name: Download toolchain
      run: |
        wget -qO- "$PADAVAN_TOOLCHAIN_URL" | tar -C padavan-ng --zstd -xf -

    - name: Build firmware
      run: |
        cp build.config padavan-ng/trunk/.config
        cd padavan-ng/trunk
        ./clear_tree.sh
        ./build_firmware.sh

        FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex ".*\.(trx|bin)$" \
                        -printf "%T@\t%f\n" | sort -V | tail -1 | cut -f2)"
        [[ -n $FW_FILE_NAME ]] || { echo "Firmware file not found"; exit 1; }
        echo "FW_FILE_NAME=$FW_FILE_NAME" >> $GITHUB_ENV

    - name: Prepare artifacts
      run: |
        cp "padavan-ng/trunk/images/$FW_FILE_NAME" .
        echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')" >> $GITHUB_ENV

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: padavan-ng_${{ env.CONFIG_VENDOR }}_${{ env.CONFIG_FIRMWARE_PRODUCT_ID }}_${{ env.BUILD_TIMESTAMP }}
        retention-days: 7
        path: |
          ${{ env.FW_FILE_NAME }}
          build.config

    - name: Check firmware size
      run: |
        partitions="padavan-ng/trunk/configs/boards/$CONFIG_VENDOR/$CONFIG_FIRMWARE_PRODUCT_ID/partitions.config"
        max_fw_size="$(awk '/Firmware/ { getline; getline; sub(",", ""); print strtonum($2); }' "$partitions")"
        fw_size="$(stat -c %s "$FW_FILE_NAME")"

        if ((fw_size > max_fw_size)); then
          fw_size_fmtd="$(numfmt --grouping "$fw_size") bytes"
          max_fw_size_fmtd="$(numfmt --grouping "$max_fw_size") bytes"
          echo "Firmware size ($fw_size_fmtd) exceeds max size ($max_fw_size_fmtd) for your target device"
          exit 1
        fi
